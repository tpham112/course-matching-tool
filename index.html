<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transfer Course Matching Tool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #eeede9;
      --text: #1a1a18;
      --text-secondary: #6b6b67;
      --border: rgba(0,0,0,0.12);
      --border-mid: rgba(0,0,0,0.2);
      --radius-md: 8px;
      --radius-lg: 12px;
      --green-bg: #E1F5EE;
      --green-text: #085041;
      --green-border: #1D9E75;
      --amber-bg: #FAEEDA;
      --amber-text: #633806;
      --amber-border: #EF9F27;
      --red-bg: #FCEBEB;
      --red-text: #791F1F;
      --red-border: #E24B4A;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --bg-secondary: #2a2a28;
        --bg-tertiary: #232321;
        --text: #f0ede6;
        --text-secondary: #9a9a94;
        --border: rgba(255,255,255,0.12);
        --border-mid: rgba(255,255,255,0.22);
        --green-bg: #04342C;
        --green-text: #9FE1CB;
        --green-border: #1D9E75;
        --amber-bg: #412402;
        --amber-text: #FAC775;
        --amber-border: #EF9F27;
        --red-bg: #501313;
        --red-text: #F7C1C1;
        --red-border: #E24B4A;
      }
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg-tertiary);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: normal;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    header p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-style: italic;
    }

    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-secondary);
      margin-bottom: 1rem;
      font-family: 'Arial', sans-serif;
    }

    .upload-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    @media (max-width: 600px) {
      .upload-grid { grid-template-columns: 1fr; }
    }

    .drop-zone {
      border: 1.5px dashed var(--border-mid);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .drop-zone:hover { background: var(--bg-secondary); }

    .drop-zone.loaded {
      border-style: solid;
      border-color: var(--green-border);
      background: var(--green-bg);
    }

    .dz-icon { font-size: 20px; }
    .dz-file-num { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); font-family: sans-serif; }
    .dz-label { font-size: 12px; color: var(--text-secondary); line-height: 1.45; font-family: sans-serif; }
    .dz-filename { font-size: 11px; font-weight: bold; color: #0F6E56; margin-top: 2px; font-family: sans-serif; word-break: break-all; }
    input[type=file] { display: none; }

    .run-btn {
      width: 100%;
      padding: 0.8rem;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-mid);
      background: var(--bg);
      font-size: 15px;
      cursor: pointer;
      color: var(--text);
      font-family: 'Georgia', serif;
      letter-spacing: 0.01em;
      transition: background 0.15s;
      margin-bottom: 1.25rem;
    }

    .run-btn:hover:not(:disabled) { background: var(--bg-secondary); }
    .run-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .run-btn.ready { border-color: var(--green-border); color: #0F6E56; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    @media (max-width: 500px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
    }

    .stat {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
    }

    .stat-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; font-family: sans-serif; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-val { font-size: 24px; font-weight: normal; }
    .stat-val.green { color: #0F6E56; }
    .stat-val.amber { color: #854F0B; }
    .stat-val.red { color: #A32D2D; }

    @media (prefers-color-scheme: dark) {
      .stat-val.green { color: #5DCAA5; }
      .stat-val.amber { color: #FAC775; }
      .stat-val.red { color: #F09595; }
    }

    .warn-box {
      font-size: 12px;
      color: var(--amber-text);
      background: var(--amber-bg);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      line-height: 1.9;
      font-family: sans-serif;
    }

    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      font-family: sans-serif;
    }

    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    .table-wrap {
      overflow-x: auto;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      font-family: sans-serif;
      min-width: 560px;
    }

    th {
      background: var(--bg-secondary);
      padding: 10px 12px;
      text-align: left;
      font-weight: bold;
      font-size: 11px;
      color: var(--text-secondary);
      border-bottom: 0.5px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    td {
      padding: 9px 12px;
      border-bottom: 0.5px solid var(--border);
      color: var(--text);
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    tr:last-child td { border-bottom: none; }
    tr.row-full td:first-child { border-left: 3px solid var(--green-border); }
    tr.row-partial td:first-child { border-left: 3px solid var(--amber-border); }
    tr.row-none td:first-child { border-left: 3px solid var(--red-border); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
    }

    .badge-full { background: var(--green-bg); color: var(--green-text); }
    .badge-partial { background: var(--amber-bg); color: var(--amber-text); }
    .badge-none { background: var(--red-bg); color: var(--red-text); }

    .muted { color: var(--text-secondary); }

    .export-btn {
      margin-top: 1rem;
      padding: 0.5rem 1.25rem;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-mid);
      background: var(--bg);
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      font-family: sans-serif;
      transition: background 0.15s;
    }

    .export-btn:hover { background: var(--bg-secondary); }

    #results { display: none; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Transfer Course Matching</h1>
      <p>Match transfer school CID &amp; course names against SAC equivalents</p>
    </header>

    <div class="card">
      <div class="card-title">Upload files</div>
      <div class="upload-grid">
        <label class="drop-zone" id="dz1">
          <input type="file" id="f1" accept=".csv,.xlsx,.xls">
          <div class="dz-icon">📋</div>
          <div class="dz-file-num">File 1</div>
          <div class="dz-label" id="dz1-label">Transfer school<br>CID + course names</div>
          <div class="dz-filename" id="dz1-name"></div>
        </label>
        <label class="drop-zone" id="dz2">
          <input type="file" id="f2" accept=".csv,.xlsx,.xls">
          <div class="dz-icon">📋</div>
          <div class="dz-file-num">File 2</div>
          <div class="dz-label" id="dz2-label">Transfer school<br>course names + units</div>
          <div class="dz-filename" id="dz2-name"></div>
        </label>
        <label class="drop-zone" id="dz3">
          <input type="file" id="f3" accept=".csv,.xlsx,.xls">
          <div class="dz-icon">🏫</div>
          <div class="dz-file-num">File 3</div>
          <div class="dz-label" id="dz3-label">SAC: CID +<br>course names + units</div>
          <div class="dz-filename" id="dz3-name"></div>
        </label>
      </div>
    </div>

    <button class="run-btn" id="runBtn" disabled>Upload all 3 files to run matching</button>

    <div id="results">
      <div class="stats" id="statsRow"></div>
      <div id="warnBox"></div>
      <div class="card">
        <div class="card-title">Matched results</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div> Full match</div>
          <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div> Partial match</div>
          <div class="legend-item"><div class="legend-dot" style="background:#E24B4A"></div> No SAC match</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>CID</th>
                <th>Transfer course</th>
                <th>T. units</th>
                <th>SAC course</th>
                <th>SAC units</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <button class="export-btn" id="exportBtn">⬇ Download CSV</button>
      </div>
    </div>
  </div>

  <script>
    let files = [null, null, null];
    let resultData = [];

    function norm(s) {
      return String(s || '').toLowerCase().replace(/\s+/g, ' ').trim();
    }

    function parseFile(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const data = e.target.result;
          let wb;
          try { wb = XLSX.read(data, { type: 'array' }); }
          catch { wb = XLSX.read(new TextDecoder().decode(data), { type: 'string' }); }
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
          resolve(rows);
        };
        reader.readAsArrayBuffer(file);
      });
    }

    function findCol(row, candidates) {
      const keys = Object.keys(row);
      for (const c of candidates) {
        const match = keys.find(k => norm(k).includes(norm(c)));
        if (match) return match;
      }
      return keys[0];
    }

    ['f1','f2','f3'].forEach((id, i) => {
      document.getElementById(id).addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        files[i] = file;
        const dz = document.getElementById('dz' + (i+1));
        dz.classList.add('loaded');
        document.getElementById('dz' + (i+1) + '-name').textContent = file.name;
        if (files.every(f => f)) {
          const btn = document.getElementById('runBtn');
          btn.disabled = false;
          btn.textContent = 'Run matching ↵';
          btn.classList.add('ready');
        }
      });
    });

    document.getElementById('runBtn').addEventListener('click', async () => {
      const btn = document.getElementById('runBtn');
      btn.disabled = true;
      btn.textContent = 'Processing...';

      try {
        const [r1, r2, r3] = await Promise.all(files.map(parseFile));

        const cidCol1  = findCol(r1[0], ['cid']);
        const nameCol1 = findCol(r1[0], ['course name','course','name','title']);
        const nameCol2 = findCol(r2[0], ['course name','course','name','title']);
        const unitCol2 = findCol(r2[0], ['unit','credit']);
        const cidCol3  = findCol(r3[0], ['cid']);
        const nameCol3 = findCol(r3[0], ['course name','course','name','title']);
        const unitCol3 = findCol(r3[0], ['unit','credit']);

        const file2Map = {};
        r2.forEach(row => { file2Map[norm(row[nameCol2])] = row[unitCol2]; });

        const file3Map = {};
        r3.forEach(row => { file3Map[norm(row[cidCol3])] = { name: row[nameCol3], units: row[unitCol3] }; });

        const warnings = [];
        resultData = [];

        r1.forEach(row => {
          const cid    = String(row[cidCol1]  || '').trim();
          const tName  = String(row[nameCol1] || '').trim();
          const tUnits = file2Map[norm(tName)];
          const sacMatch = file3Map[norm(cid)];

          if (tUnits === undefined) warnings.push(`No unit match for "${tName}" (File 1 → File 2)`);

          let status = 'none';
          if (tUnits !== undefined && sacMatch)  status = 'full';
          else if (tUnits !== undefined || sacMatch) status = 'partial';

          resultData.push({
            cid,
            tName,
            tUnits:   tUnits !== undefined ? tUnits : '',
            sacName:  sacMatch ? sacMatch.name  : '',
            sacUnits: sacMatch ? sacMatch.units : '',
            status
          });
        });

        const full    = resultData.filter(r => r.status === 'full').length;
        const partial = resultData.filter(r => r.status === 'partial').length;
        const none    = resultData.filter(r => r.status === 'none').length;

        document.getElementById('statsRow').innerHTML = `
          <div class="stat"><div class="stat-label">Total rows</div><div class="stat-val">${resultData.length}</div></div>
          <div class="stat"><div class="stat-label">Full match</div><div class="stat-val green">${full}</div></div>
          <div class="stat"><div class="stat-label">Partial</div><div class="stat-val amber">${partial}</div></div>
          <div class="stat"><div class="stat-label">No SAC match</div><div class="stat-val red">${none}</div></div>
        `;

        const warnBox = document.getElementById('warnBox');
        if (warnings.length) {
          warnBox.innerHTML = `<div class="warn-box"><strong>Warnings (${warnings.length}):</strong><br>${warnings.slice(0,10).join('<br>')}${warnings.length > 10 ? '<br>...and ' + (warnings.length - 10) + ' more' : ''}</div>`;
        } else {
          warnBox.innerHTML = '';
        }

        document.getElementById('tbody').innerHTML = resultData.map(r => `
          <tr class="row-${r.status}">
            <td>${r.cid}</td>
            <td title="${r.tName}">${r.tName}</td>
            <td>${r.tUnits}</td>
            <td title="${r.sacName}">${r.sacName || '<span class="muted">—</span>'}</td>
            <td>${r.sacUnits || '<span class="muted">—</span>'}</td>
            <td><span class="badge badge-${r.status}">${r.status === 'full' ? 'Full match' : r.status === 'partial' ? 'Partial' : 'No match'}</span></td>
          </tr>
        `).join('');

        document.getElementById('results').style.display = 'block';
        btn.textContent = 'Re-run matching ↵';
        btn.disabled = false;
      } catch(err) {
        btn.textContent = 'Error — try again';
        btn.disabled = false;
        console.error(err);
      }
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      const rows = [['CID','Transfer Course','Transfer Units','SAC Course','SAC Units','Status']];
      resultData.forEach(r => rows.push([r.cid, r.tName, r.tUnits, r.sacName, r.sacUnits, r.status]));
      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Matched Courses');
      XLSX.writeFile(wb, 'course_matching_results.csv');
    });
  </script>
</body>
</html>
